<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- NM Radionuclide Planner — radiation trefoil -->
  <rect width="64" height="64" rx="12" fill="#2d6a4f"/>
  <g transform="translate(32,32)" fill="#ffd166">
    <!-- three 60°-wide blades at 90°, 210°, 330° -->
    <path d="M 0 0 L 11.5 -19.92 A 23 23 0 0 1 23 0 Z" transform="rotate(30)"/>
    <path d="M 0 0 L 11.5 -19.92 A 23 23 0 0 1 23 0 Z" transform="rotate(150)"/>
    <path d="M 0 0 L 11.5 -19.92 A 23 23 0 0 1 23 0 Z" transform="rotate(270)"/>
    <circle r="6" fill="#ffd166"/>
    <circle r="6" fill="none" stroke="#2d6a4f" stroke-width="2.5"/>
  </g>
</svg>
